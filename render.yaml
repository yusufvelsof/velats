services:
  - type: web
    name: velocity-ats-api
    runtime: node
    rootDir: ats-system
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && npx prisma db seed && npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ats-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: http://localhost:3000 # Update this after Vercel deploy
